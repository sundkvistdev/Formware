<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/phenom.css">
    <title>Formware OS</title>
</head>
<body>
    <div class="fw-os-root">
        <!-- Window Test -->
        <div class="fw-window" style="left: 50px; top: 50px; width: 320px; height: 240px;">
            <!-- Root Els. -->
            <div class="fw-titlebar">
                <div class="fw-title">Window</div>
                <div class="fw-group">
                    <div class="fw-wndbtn fw-closebtn"></div>
                    <div class="fw-wndbtn fw-maximizebtn"></div>
                    <div class="fw-wndbtn fw-minimizebtn"></div>
                </div>
            </div>
            

            <!-- Content -->
            <div class="fw-wcontent">
                <button class="fw-cursor-arrow">Arrow (Default)</button>
                <button class="fw-cursor-arrow-load">Arrow Load</button>
                <button class="fw-cursor-load">Load</button>
                <button class="fw-cursor-pointer">Pointer</button>
                <button class="fw-cursor-beam">Beam</button>
            </div>
        </div>
    </div>

    <script type="module" src="system/main.js"></script>
</body>
</html>
