<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/phenom.css">
    <title>Formware OS</title>
</head>
<body>
    <div class="formware os-root">
        <!-- Window Test -->
        <div class="fw-window">
            <!-- Root Els. -->
            <div class="fw-title">Window</div>
            <div class="fw-group">
                <div class="fw-wndbtn fw-minimizebtn"></div>
                <div class="fw-wndbtn fw-maximizebtn"></div>
                <div class="fw-wndbtn fw-closebtn"></div>
            </div>

            <!-- Frame -->
            <div class="fw-wframeseg fw-top-l"></div>
            <div class="fw-wframeseg fw-top"></div>
            <div class="fw-wframeseg fw-top-r"></div>
            <div class="fw-wframeseg fw-side-l"></div>
            <div class="fw-wframeseg fw-side-r"></div>
            <div class="fw-wframeseg fw-bot-l"></div>
            <div class="fw-wframeseg fw-bot"></div>
            <div class="fw-wframeseg fw-bot-r"></div>

            <!-- Content -->
             <div class="fw-wcontent"></div>
        </div>
    </div>

    <script type="module" src="system/main.js"></script>
</body>
</html>
