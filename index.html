<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/phenom.css">
    <title>Formware OS</title>
</head>
<body>
    <div class="formware os-root">
        <!-- Window Test -->
        <div class="fw-window" style="left: 50px; top: 50px; width: 320px; height: 240px;">
            <!-- Root Els. -->
            <div class="fw-title">Window</div>
            <div class="fw-group">
                <div class="fw-wndbtn fw-closebtn"></div>
                <div class="fw-wndbtn fw-maximizebtn"></div>
                <div class="fw-wndbtn fw-minimizebtn"></div>
            </div>

            <!-- Content -->
            <div class="fw-wcontent">
                <div style="position: absolute; left: -20px; top: 0px; background-image: var(--uiatl); background-position: 0px -128px; width: 32px; height: 32px;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="system/main.js"></script>
</body>
</html>
